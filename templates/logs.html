{% extends "base.html" %}

{% block title %}Activity Logs — DDNS Dashboard{% endblock %}

{% block content %}

<div class="card mt-2">
  <div class="card-header">
    <span class="card-title">Activity Log</span>
    <div class="flex items-center gap-2">
      <span class="htmx-indicator text-xs text-muted">refreshing…</span>
      <form hx-post="/clear-logs"
            hx-target="#log-content"
            hx-swap="innerHTML"
            hx-confirm="Clear all log entries? This cannot be undone."
            style="display:inline">
        <button type="submit" class="btn btn-ghost btn-sm">Clear Logs</button>
      </form>
    </div>
  </div>
  <div class="card-body" style="padding: 0.75rem;">
    <div x-data="{ follow: true }"
         x-init="$el.addEventListener('htmx:afterSwap', () => {
           if (follow) {
             const log = $el.querySelector('.log-viewer');
             if (log) $nextTick(() => { log.scrollTop = log.scrollHeight; });
           }
         })">
      <div style="display:flex; align-items:center; justify-content:flex-end; margin-bottom:0.4rem;">
        <button class="btn btn-ghost btn-sm"
                @click="follow = !follow"
                x-text="follow ? 'Following \u25bc' : 'Paused \u23f8'">Following &#9660;</button>
      </div>
      <div id="log-content"
           hx-get="/api/logs/recent"
           hx-trigger="load, sse:log_appended"
           hx-swap="innerHTML">
        {% include "partials/log_panel.html" %}
      </div>
    </div>
  </div>
</div>

{% endblock %}
